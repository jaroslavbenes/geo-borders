<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geo Borders — Plzeň</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        background: #1a1a2e;
        color: #e0e0e0;
      }

      header {
        flex-shrink: 0;
        padding: 12px 16px;
        background: #16213e;
        border-bottom: 1px solid #0f3460;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #e94560;
        white-space: nowrap;
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        flex: 1;
      }

      .layer-btn {
        padding: 5px 12px;
        border-radius: 20px;
        border: 2px solid transparent;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        background: #0f3460;
        color: #a0b4d0;
        transition: all 0.15s;
      }

      .layer-btn:hover { opacity: 0.85; }

      .layer-btn.active { color: #fff; }
      .layer-btn.active { border-color: #ff2222; background: #3d0d0d; color: #ff6666; }

      .search-wrap {
        position: relative;
        margin-left: auto;
      }

      #search {
        padding: 5px 12px;
        border-radius: 20px;
        border: 1px solid #0f3460;
        background: #0f3460;
        color: #e0e0e0;
        font-size: 0.85rem;
        width: 200px;
        outline: none;
      }

      #search:focus { border-color: #4fc3f7; }
      #search::placeholder { color: #607080; }

      #suggestions {
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 8px;
        width: 240px;
        max-height: 240px;
        overflow-y: auto;
        z-index: 1000;
        display: none;
      }

      .suggestion {
        padding: 7px 12px;
        cursor: pointer;
        font-size: 0.82rem;
        border-bottom: 1px solid #0f3460;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .suggestion:last-child { border-bottom: none; }
      .suggestion:hover { background: #0f3460; }

      .type-badge {
        font-size: 0.65rem;
        background: #0f3460;
        padding: 1px 5px;
        border-radius: 4px;
        color: #607080;
        white-space: nowrap;
        margin-left: 8px;
      }

      #map { flex: 1; }

      #info-panel {
        position: absolute;
        bottom: 24px;
        right: 12px;
        z-index: 500;
        background: #16213e;
        border: 1px solid #0f3460;
        border-radius: 10px;
        padding: 14px 18px;
        min-width: 200px;
        max-width: 280px;
        display: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }

      #info-panel h3 {
        font-size: 1rem;
        color: #ff6666;
        margin-bottom: 8px;
      }

      #info-panel table {
        font-size: 0.78rem;
        border-collapse: collapse;
        width: 100%;
      }

      #info-panel td { padding: 2px 0; color: #a0b4d0; }
      #info-panel td:first-child { color: #607080; padding-right: 10px; white-space: nowrap; }

      .close-btn {
        float: right;
        cursor: pointer;
        color: #607080;
        font-size: 1rem;
        line-height: 1;
        margin-left: 8px;
        margin-top: -2px;
      }

      .close-btn:hover { color: #e94560; }

      .time-marker { background: transparent; border: none; }
      .time-marker-inner {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #ffaa00;
        color: #1a1a2e;
        font-weight: 700;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #1a1a2e;
        box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      }

      .neighborhood-label {
        background: none;
        border: none;
        white-space: nowrap;
        color: #fff;
        font-size: 0.7rem;
        font-weight: 600;
        text-shadow: 0 0 4px #000, 0 0 2px #000;
        pointer-events: none;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Geo Borders — Plzeň</h1>
      <div class="controls">
        <button class="layer-btn active" data-layer="neighborhoods">Čtvrtě (18)</button>
        <button class="layer-btn" data-layer="zsj">ZSJ (125)</button>
        <button class="layer-btn" data-layer="katuze">Kat. území (23)</button>
        <button class="layer-btn" data-layer="obec">Obec</button>
        <button class="layer-btn" data-layer="points">Body</button>
      </div>
      <div class="search-wrap">
        <input id="search" type="text" placeholder="Hledat oblast…" autocomplete="off" />
        <div id="suggestions"></div>
      </div>
    </header>

    <div id="map"></div>

    <div id="info-panel">
      <span class="close-btn" id="close-info">✕</span>
      <h3 id="info-name"></h3>
      <table id="info-table"></table>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
